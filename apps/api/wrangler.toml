name = "family-tree-api"
main = "src/index.ts"
compatibility_date = "2026-04-06"

[assets]
directory = "../web/dist/web/browser"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
SESSION_COOKIE_NAME = "ft_session"

[[d1_databases]]
binding = "DB"
database_name = "family-tree"
database_id = "846da848-94b8-4a76-b893-5113ad6f7e4c"
migrations_dir = "migrations"
